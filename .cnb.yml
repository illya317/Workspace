cnb-release:
  # 关闭 GitHub 镜像同步后的自动部署；手动触发用 api_trigger_manual。
  # 本文件只保留公开流水线形状。真实 CNB env import 地址和部署目标值
  # 在私有 ops ($PRIVATE_OPS_DIR/cnb.yml) 中维护，发布脚本会把真实配置
  # 注入到 cnb-release 分支后再推送到 CNB。
  api_trigger_manual:
    - name: deploy-prod
      docker:
        image: node:22-bookworm
      imports:
        - https://cnb.cool/<owner>/<env-repo>/-/blob/main/server-prod.yaml
      stages:
        - name: install-deploy-tools
          script: |
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends openssh-client rsync ca-certificates python3
        - name: install-node-deps
          script: |
            npm ci --no-audit --fund=false --loglevel=error
        - name: validate-deploy-input
          script: |
            if [ "${RUN_LOCAL_CHECKS:-1}" = "0" ]; then
              echo "==> 跳过部署前校验（RUN_LOCAL_CHECKS=0）"
              exit 0
            fi
            npm run deploy:preflight:ci
        - name: deploy-to-server
          script: |
            bash ./ops/deploy.sh
