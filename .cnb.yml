main:
  push:
    - name: ci-check
      docker:
        image: node:22-bookworm
      stages:
        - name: install-deps
          script: |
            npm ci --no-audit --fund=false --loglevel=error
        - name: validate
          script: |
            npm run ci:cnb

  api_trigger_ci:
    - name: ci-check
      docker:
        image: node:22-bookworm
      stages:
        - name: install-deps
          script: |
            npm ci --no-audit --fund=false --loglevel=error
        - name: validate
          script: |
            npm run ci:cnb

  api_trigger:
    - name: deploy-prod
      docker:
        image: node:22-bookworm
      imports:
        - https://cnb.cool/illya317/env/-/blob/main/server-prod.yml
      env:
        REMOTE_DIR: "/home/ubuntu/workspace"
        PM2_NAME: "workspace"
        REMOTE_WORKSPACE_CONFIG_DIR: "/home/ubuntu/workspace/.workspace"
        HEALTHCHECK_URL: "http://127.0.0.1:3000/"
        RUN_LOCAL_CHECKS: "0"
      stages:
        - name: install-deploy-tools
          script: |
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends openssh-client rsync ca-certificates python3
        - name: install-node-deps
          script: |
            npm ci --no-audit --fund=false --loglevel=error
        - name: validate-deploy-input
          script: |
            npm run db:validate
            npm run api:check
            npm run schema:check
            npm run company:check
            npx tsc --noEmit
        - name: deploy-to-server
          script: |
            bash ./ops/deploy.sh
