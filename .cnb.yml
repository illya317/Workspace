main:
  api_trigger:
    - name: deploy-prod
      docker:
        image: node:22-bookworm
      imports:
        - https://cnb.cool/illya317/env/-/blob/main/server-prod.yaml
      env:
        REMOTE_DIR: "/home/ubuntu/workspace"
        PM2_NAME: "workspace"
        REMOTE_WORKSPACE_CONFIG_DIR: "/home/ubuntu/workspace/.workspace"
        HEALTHCHECK_URL: "http://127.0.0.1:3000/workspace/login"
        RUN_LOCAL_CHECKS: "0"
      stages:
        - name: install-deploy-tools
          script: |
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends openssh-client rsync ca-certificates python3
        - name: install-node-deps
          script: |
            npm ci --no-audit --fund=false --loglevel=error
        - name: validate-deploy-input
          script: |
            if [ "${RUN_LOCAL_CHECKS:-1}" = "0" ]; then
              echo "==> 跳过部署前校验（RUN_LOCAL_CHECKS=0）"
              exit 0
            fi
            npm run db:validate
            npm run api:check
            npm run schema:check
            npm run company:check
            npx tsc --noEmit
        - name: deploy-to-server
          script: |
            bash ./ops/deploy.sh
