main:
  api_trigger_ci:
    - name: ci-check
      docker:
        image: node:22-bookworm
      stages:
        - name: install-deps
          script: |
            npm ci --no-audit --fund=false --loglevel=error
        - name: validate
          script: |
            npm run ci:cnb

  api_trigger:
    - name: deploy-prod
      docker:
        image: ubuntu:24.04
      imports:
        - https://cnb.cool/illya317/env/-/blob/main/workspace-prod.yml
      env:
        RUN_LOCAL_CHECKS: "0"
      stages:
        - name: install-deploy-tools
          script: |
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends openssh-client rsync ca-certificates
        - name: deploy-to-server
          script: |
            bash ./ops/deploy.sh
