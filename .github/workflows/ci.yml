name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma schema validate
        run: npm run db:validate

      - name: Schema governance
        run: npm run schema:check

      - name: Full CI
        run: npm run ci
        env:
          NEXTAUTH_SECRET: ci-dummy-secret
