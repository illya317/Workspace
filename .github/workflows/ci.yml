name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./prisma/dev.db
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Architecture AST scan
        run: npm run arch:scan

      - name: Dependency DAG
        run: npm run lint:deps

      - name: Module definitions
        run: npm run module-check

      - name: Authorization and API gate
        run: npm run auth:check

      - name: Lint
        run: npm run lint:full

      - name: Test
        run: npm test

      - name: Prisma schema validate
        run: npm run db:validate

      - name: Schema governance
        run: npm run schema:check

      - name: Full CI
        run: npm run ci
        env:
          NEXTAUTH_SECRET: ci-dummy-secret-for-build
