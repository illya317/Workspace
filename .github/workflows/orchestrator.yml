name: Orchestrator Guard

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect changed files
        shell: bash
        run: |
          git diff --name-only --diff-filter=ACMRT \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" > /tmp/orchestrator-files.txt
          cat /tmp/orchestrator-files.txt

      - name: Detect declared agent
        id: declared-agent
        shell: bash
        run: |
          labels=$(jq -r '[.pull_request.labels[].name
            | select(test("^agent:[[:space:]]*(architect|feature|data|ops)$"))
            | sub("^agent:[[:space:]]*"; "")] | unique | .[]' "$GITHUB_EVENT_PATH")
          count=$(printf "%s\n" "$labels" | sed '/^$/d' | wc -l | tr -d ' ')
          if [ "$count" -ne 1 ]; then
            echo "Exactly one agent label is required: agent: architect, agent: feature, agent: data, or agent: ops."
            exit 1
          fi
          agent=$(printf "%s\n" "$labels" | sed -n '1p')
          echo "agent=$agent" >> "$GITHUB_OUTPUT"
          echo "ORCHESTRATOR_AGENT=$agent" >> "$GITHUB_ENV"

      - name: Route PR
        run: npx tsx orchestrator/router.ts --files-from /tmp/orchestrator-files.txt

      - name: Validate PR ownership
        run: npx tsx scripts/orchestrator-check.ts --agent "${{ steps.declared-agent.outputs.agent }}" --files-from /tmp/orchestrator-files.txt
