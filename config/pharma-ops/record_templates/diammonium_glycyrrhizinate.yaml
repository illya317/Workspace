产品名称: 甘草酸二铵胶囊
阶段:
  intermediate:
    显示名: 中间体
    检验前确认:
      顶部信息:
        检品名称: 甘草酸二铵胶囊(中间体)
        包装情况: 桶、塑料袋
        检验目的: 性状、水分、含量
        请验部门: 固体制剂车间
      文件清单:
      - 名称: 《甘草酸二铵胶囊中间体质量标准》
        编码: MQS074030
      - 名称: 《甘草酸二铵胶囊中间体检验标准操作规程》
        编码: SOP073430
      - 名称: 《MA37-1CN型水分快速测定仪使用与维护标准操作规程》
        编码: SOP072098
      - 名称: 《电子天平（BS224S、BSA224S）使用与维护标准操作规程》
        编码: SOP072028
      - 名称: 《TU-1901双光束紫外可见分光光度计标准操作规程》
        编码: SOP072045
      确认项:
      - 名称: 仪器、设备是否在校验有效期内
      - 名称: 检验用具、物品是否齐全
      环境确认:
        符合要求: true
        不符合要求: true
    检测项:
    - 序号: '2.1'
      名称: 性状
      英文名: appearance
      实验环境模板: env_10_30_75
      标准规定模板: appearance_description
      标准规定参数:
        description: 本品应为白色或类白色粉末或颗粒
      结论名称: 性状
      结论含数值: false
      方法: 目测
      结论判定:
        rule: 符合标准规定
    - 序号: '2.2'
      名称: 水分
      英文名: moisture
      实验环境模板: env_10_30_70
      仪器设备模板: standard_equipment_list
      仪器设备参数:
        items:
        - 快速水分测定仪
      标准规定模板: moisture_s_limit
      标准规定参数:
        limit: 5.0
      清场模板: standard_cleanup
      结论名称: 水分
      结论含数值: true
      结论判定:
        value_field: 平均水分
        unit: '%'
        rule: 平均水分 <= 5.0 && RD <= 2.0
      方法: 水分
    - 序号: '2.3'
      名称: 含量
      英文名: content
      实验环境模板: env_10_30_75
      实验环境参数:
        多行: 3
      仪器设备模板: standard_equipment_list
      仪器设备参数:
        items:
        - 电子天平
        - 紫外可见分光光度计
      标准品模板: standard_reference_list
      标准品参数:
        items:
        - 烟酰胺对照品
      标准规定模板: content_assay_range
      标准规定参数:
        subject: 含甘草酸二铵（C12H68N2O16计）
        lower: 93.0
        upper: 107.0
        phrase: 应为标示量的
      清场模板: standard_cleanup
      结论名称: 含量
      结论含数值: true
      结论判定:
        value_field: 平均含量
        unit: '%'
        rule: 平均含量 >= 93.0 && 平均含量 <= 107.0 && RD <= 2.0
      附加说明模板: data_page_attachment
      附加说明参数:
        items:
        - 图谱
        - 中间体检验报告单
      方法: UV-甘草酸二铵含量
