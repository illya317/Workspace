      - 名称: 检验用具、物品是否齐全
      环境确认:
        符合要求: true
        不符合要求: true
    检测项:
    - 序号: '2.1'
      名称: 性状
      英文名: appearance
      实验环境:
        温度: 10℃～30℃
        湿度: ≤75%
      标准规定模板: appearance_description
      标准规定参数:
        description: 本品应为白色颗粒
      结论名称: 性状
      结论含数值: false
      方法: 目测
      结论判定:
        rule: 符合标准规定
    - 序号: '2.2'
      名称: 水分
      英文名: moisture
      实验环境:
        温度: 10℃～30℃
        湿度: ≤70%
      仪器设备:
      - 名称: 快速水分测定仪
        状态: 已清洁
      - 名称: “已清洁”
        状态: 已清洁
      标准规定模板: moisture_s_limit
      标准规定参数:
        limit: 5.0
      清场模板: standard_cleanup
      结论名称: 水分
      结论含数值: true
      结论判定:
        value_field: 平均水分
        unit: '%'
        rule: 平均水分 <= 5.0 && RD <= 2.0
      方法: 水分
    - 序号: '2.3'
      名称: 含量
      英文名: content
      实验环境:
        温度: 10℃～30℃
        湿度: ≤75%
        多行: 2
      标准规定模板: content_assay_range
      标准规定参数:
        subject: 含甲巯咪唑（C4H6N2S）
        lower: 96.0
        upper: 104.0
        phrase: 应为标示量的
      结论名称: 含量
      结论含数值: true
      清场模板: standard_cleanup
      仪器设备:
      - 名称: 电子天平
        状态: 已清洁
      - 名称: “已清洁”
        状态: 已清洁
      试验材料:
      - 名称: 0.1mol/L氢氧化钠滴定液
      - 名称: 0.1mol/L硝酸银溶液
      - 名称: 溴麝香草酚蓝指示液
      方法: 滴定
      结论判定:
        value_field: 平均含量
        unit: '%'
        rule: 平均含量 >= 96.0 && 平均含量 <= 104.0 && RD <= 2.0
