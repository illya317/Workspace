        不符合要求: true
    检测项:
    - 序号: '2.1'
      名称: 水分
      英文名: moisture
      实验环境:
        温度: 10℃～30℃
        湿度: ≤70%
      仪器设备:
      - 名称: 快速水分测定仪
        状态: 已清洁
      - 名称: “已清洁”
        状态: 已清洁
      标准规定模板: moisture_s_limit
      标准规定参数:
        limit: 5.0
      清场模板: standard_cleanup
      结论名称: 水分
      结论含数值: true
      结论判定:
        value_field: 平均水分
        unit: '%'
        rule: 平均水分 <= 5.0 && RD <= 2.0
      方法: 水分
    - 序号: '2.2'
      名称: 含量
      英文名: content
      实验环境:
        温度: 10℃～30℃
        湿度: ≤75%
        多行: 3
