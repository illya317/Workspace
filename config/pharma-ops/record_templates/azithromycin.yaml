      - 名称: 流动相
      - 名称: 色谱柱
      标准品:
      - 名称: 阿奇霉素对照品
      - 名称: 阿奇霉素系统适用性对照品
      标准规定模板: content_assay_range
      标准规定参数:
        subject: 含阿奇霉素（C38H72N2O12计）
        lower: 93.0
        upper: 107.0
        phrase: 应为标示量的
      清场模板: standard_cleanup
      结论名称: 含量
      结论含数值: true
      附加说明: 原始数据、图谱、中间体检验报告单见数据图谱粘贴页。
      方法: HPLC
      结论判定:
        value_field: 平均含量
        unit: '%'
        rule: 平均含量 >= 93.0 && 平均含量 <= 107.0 && RD <= 2.0
