        编码: SOP072098
      - 名称: 《电子天平（BS224S、BSA224S）使用与维护标准操作规程》
        编码: SOP072028
      - 名称: 《BT125D十万分之一电子天平使用与维护标准操作规程》
        编码: SOP072055
      - 名称: 《Waters e2695高效液相色谱仪标准操作规程》
        编码: SOP072068
      - 名称: 《Thermo Vanquish超高效液相色谱仪标准操作规程》
        编码: SOP072117
      确认项:
      - 名称: 仪器、设备是否在校验有效期内
      - 名称: 检验用具、物品是否齐全
      环境确认:
        符合要求: true
        不符合要求: true
    检测项:
    - 序号: '2.1'
      名称: 性状
      英文名: appearance
      实验环境模板: env_10_30_75
      标准规定模板: appearance_description
      标准规定参数:
        description: 本品应为白色颗粒
      结论名称: 性状
      结论含数值: false
      方法: 目测
      结论判定:
        rule: 符合标准规定
    - 序号: '2.2'
      名称: 水分
      英文名: moisture
      实验环境模板: env_10_30_70
      仪器设备模板: standard_equipment_list
      仪器设备参数:
        items:
        - 快速水分测定仪
      标准规定模板: moisture_s_limit
      标准规定参数:
        limit: 3.5
      清场模板: standard_cleanup
      结论名称: 水分
      结论含数值: true
      结论判定:
        value_field: 平均水分
        unit: '%'
        rule: 平均水分 <= 3.5 && RD <= 2.0
      方法: 水分
    - 序号: '2.3'
      名称: 含量
      英文名: content
      实验环境模板: env_10_30_75
      实验环境参数:
        多行: 3
      仪器设备模板: standard_equipment_list
      仪器设备参数:
        items:
        - 电子天平
        - 高效液相色谱仪
      试验材料模板: standard_material_list
      试验材料参数:
        items:
        - 流动相
        - 色谱柱
      标准品模板: standard_reference_list
      标准品参数:
        items:
        - 盐酸维拉帕米对照品
      标准规定模板: content_assay_range
      标准规定参数:
        subject: 含盐酸维拉帕米（C27H38FN2O4.HCL计）
        lower: 93.0
        upper: 107.0
        phrase: 应为标示量的
      清场模板: standard_cleanup
      结论名称: 含量
      结论含数值: true
      附加说明模板: data_page_attachment
      附加说明参数:
        items:
        - 图谱
        - 中间体检验报告单
      方法: HPLC
      结论判定:
        value_field: 平均含量
        unit: '%'
        rule: 平均含量 >= 93.0 && 平均含量 <= 107.0 && RD <= 2.0
