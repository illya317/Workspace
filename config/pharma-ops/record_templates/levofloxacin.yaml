      - 名称: 色谱柱
      标准品:
      - 名称: 左氧氟沙星对照品
      标准规定模板: content_assay_range
      标准规定参数:
        subject: 含左氧氟沙星（C18H20FN3O4计）
        lower: 93.0
        upper: 107.0
        phrase: 应为标示量的
      清场模板: standard_cleanup
      结论名称: 含量
      结论含数值: true
      附加说明: '、图谱、中间体检验报告单见数据图谱粘贴页。

        > 📎 数据图谱粘贴页'
      方法: HPLC
      结论判定:
        value_field: 平均含量
        unit: '%'
        rule: 平均含量 >= 93.0 && 平均含量 <= 107.0 && RD <= 2.0
