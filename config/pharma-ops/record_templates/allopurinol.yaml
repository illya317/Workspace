产品名称: 别嘌醇片
阶段:
  intermediate:
    显示名: 中间体
    检验前确认:
      顶部信息:
        检品名称: 别嘌醇片(中间体)
        包装情况: 桶、塑料袋
        检验目的: 性状、水分、含量
        请验部门: 固体制剂车间
      文件清单:
      - 名称: 《别嘌醇片中间体质量标准》
        编码: MQS074023
      - 名称: 《别嘌醇片中间体检验标准操作规程》
        编码: SOP073423
      - 名称: 《MA37-1CN型水分快速测定仪使用与维护标准操作规程》
        编码: SOP072098
      - 名称: 《电子天平（BS224S、BSA224S）使用与维护标准操作规程》
        编码: SOP072028
      - 名称: 《TU-1901双光束紫外可见分光光度计标准操作规程》
        编码: SOP072045
      确认项:
      - 名称: 仪器、设备是否在校验有效期内
      - 名称: 检验用具、物品是否齐全
      环境确认:
        符合要求: true
        不符合要求: true
    检测项:
    - 序号: '2.1'
      名称: 性状
      英文名: appearance
      实验环境:
        温度: 10℃～30℃
        湿度: ≤75%
      标准规定模板: appearance_description
      标准规定参数:
        description: 本品应为白色颗粒
      结论含数值: false
      结论名称: 性状
      方法: 目测
      结论判定:
        rule: 符合标准规定
    - 序号: '2.2'
      名称: 水分
      英文名: moisture
      实验环境:
        温度: 10℃～30℃
        湿度: ≤70%
      仪器设备:
      - 名称: 快速水分测定仪
        状态: 已清洁
      标准规定模板: moisture_s_limit
      标准规定参数:
        limit: 5.0
      结论判定:
        value_field: 平均水分
        unit: '%'
        rule: 平均水分 <= 5.0 && RD <= 2.0
      清场模板: standard_cleanup
      结论名称: 水分
      结论含数值: true
      方法: 水分
    - 序号: '2.3'
      名称: 含量
      英文名: content
      方法: UV-BPC中间体含量
      实验环境:
        温度: 10℃～30℃
        湿度: ≤75%（天平室≤70%）
        多行: 3
      仪器设备:
      - 名称: 电子天平
        状态: 已清洁
      - 名称: 双光束紫外可见分光光度计
        状态: 已清洁
      试验材料:
      - 名称: 0.2%氢氧化钠溶液
      - 名称: 0.1mol/L盐酸溶液
      标准规定模板: content_assay_range
      标准规定参数:
        subject: 含别嘌醇（C₅H₄N₄O计）
        lower: 95.0
        upper: 105.0
        phrase: 应为标示量的
      清场模板: standard_cleanup
      结论名称: 含量
      结论含数值: true
      附加说明: 原始数据、图谱、中间体检验报告单见数据图谱粘贴页。
      结论判定:
        value_field: 平均含量
        unit: '%'
        rule: 平均含量 >= 95.0 && 平均含量 <= 105.0 && RD <= 2.0
