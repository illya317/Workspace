产品名称: 螺内酯片
阶段:
  intermediate:
    显示名: 中间体
    检验前确认:
      顶部信息:
        检品名称: 螺内酯片(中间体)
        包装情况: 桶、塑料袋
        检验目的: 性状、水分、含量
        请验部门: 固体制剂车间
      文件清单:
      - 名称: 《螺内酯片中间体质量标准》
        编码: MQS074027
      - 名称: 《螺内酯片中间体检验标准操作规程》
        编码: SOP073427
      - 名称: 《MA37-1CN型水分快速测定仪使用与维护标准操作规程》
        编码: SOP072098
      - 名称: 《电子天平（BS224S、BSA224S）使用与维护标准操作规程》
        编码: SOP072028
      - 名称: 《BT125D十万分之一电子天平使用与维护标准操作规程》
        编码: SOP072055
      - 名称: 《Waters e2695高效液相色谱仪标准操作规程》
        编码: SOP072068
      - 名称: 《Thermo Vanquish超高效液相色谱仪标准操作规程》
        编码: SOP072117
      确认项:
      - 名称: 仪器、设备是否在校验有效期内
      - 名称: 检验用具、物品是否齐全
      环境确认:
        符合要求: true
        不符合要求: true
    检测项:
    - 序号: '2.1'
      名称: 性状
      英文名: appearance
      实验环境:
        温度: 10℃～30℃
        湿度: ≤75%
      标准规定模板: appearance_description
      标准规定参数:
        description: 本品应为白色颗粒
      结论名称: 性状
      结论含数值: false
      方法: 目测
      结论判定:
        rule: 符合标准规定
    - 序号: '2.2'
      名称: 水分
      英文名: moisture
      实验环境:
        温度: 10℃～30℃
        湿度: ≤70%
      仪器设备:
      - 名称: 快速水分测定仪
        状态: 已清洁
      - 名称: “已清洁”
        状态: 已清洁
      标准规定模板: moisture_s_limit
      标准规定参数:
        limit: 5.0
      清场模板: standard_cleanup
      结论名称: 水分
      结论含数值: true
      结论判定:
        value_field: 平均水分
        unit: '%'
        rule: 平均水分 <= 5.0 && RD <= 2.0
      方法: 水分
    - 序号: '2.3'
      名称: 含量
      英文名: content
      实验环境:
        温度: 10℃～30℃
        湿度: ≤75%
        多行: 2
      仪器设备:
      - 名称: 电子天平
        状态: 已清洁
      - 名称: “已清洁”
        状态: 已清洁
      - 名称: 高效液相色谱仪
        状态: 已清洁
      试验材料:
      - 名称: 流动相
      - 名称: 色谱柱
      标准品:
      - 名称: 螺内酯对照品
      标准规定模板: content_assay_range
      标准规定参数:
        subject: 含螺内酯（C24H32O4S计）
        lower: 95.0
        upper: 105.0
        phrase: 应为标示量的
      清场模板: standard_cleanup
      结论名称: 含量
      结论含数值: true
      附加说明: '、图谱、中间体检验报告单见数据图谱粘贴页。

        > 📎 数据图谱粘贴页'
      方法: HPLC
      结论判定:
        value_field: 平均含量
        unit: '%'
        rule: 平均含量 >= 95.0 && 平均含量 <= 105.0 && RD <= 2.0
