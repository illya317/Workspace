      标准规定模板: related_substances_numbered_rules
      标准规定参数:
        rules:
        - type: peak_area_multiple_limit
          label: 254nm各杂质峰面积的和
          comparison: 对照溶液（1）主峰面积
          multiple: 1
          limit: 1.0
        - type: named_external_standard_limit
          detection: 283nm
          name: 坎利酮杂质
          subject: 螺内酯标示量
          limit: 1.0
        - type: multi_wavelength_total_limit
          wavelengths:
          - 254nm
          - 283nm
          limit: 1.0
      清场模板: standard_cleanup
      结论名称: 有关物质
      结论含数值: false
      方法: 有关物质-螺内酯
      结论判定:
        rule: 254nm杂质 <= 1.0 && 283nm坎利酮 <= 1.0 && 总杂 <= 1.0
