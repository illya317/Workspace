      - 名称: 检验用具、物品是否齐全
      环境确认:
        符合要求: true
        不符合要求: true
    检测项:
    - 序号: '2.1'
      名称: 性状
      英文名: appearance
      实验环境模板: env_10_30_75
      标准规定模板: appearance_description
      标准规定参数:
        description: 本品应为白色或类白色颗粒或结晶性粉末
      结论名称: 性状
      结论含数值: false
      方法: 目测
      结论判定:
        rule: 符合标准规定
    - 序号: '2.2'
      名称: 水分
      英文名: moisture
      实验环境模板: env_10_30_70
      仪器设备模板: standard_equipment_list
      仪器设备参数:
        items:
        - 快速水分测定仪
      标准规定模板: moisture_s_limit
      标准规定参数:
        limit: 5.0
      清场模板: standard_cleanup
      结论名称: 水分
      结论含数值: true
      结论判定:
        value_field: 平均水分
        unit: '%'
        rule: 平均水分 <= 5.0 && RD <= 2.0
      方法: 水分
    - 序号: '2.3'
      名称: 含量
      英文名: content
      实验环境模板: env_10_30_75
      实验环境参数:
        多行: 3
      仪器设备模板: standard_equipment_list
