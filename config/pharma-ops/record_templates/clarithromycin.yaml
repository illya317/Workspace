        - 电子天平
        - 高效液相色谱仪
      试验材料模板: standard_material_list
      试验材料参数:
        items:
        - 流动相
        - 色谱柱
      标准品模板: standard_reference_list
      标准品参数:
        items:
        - 克拉霉素对照品
      标准规定模板: content_assay_range
      标准规定参数:
        subject: 含克拉霉素（C38H69NO13计）
        lower: 93.0
        upper: 107.0
        phrase: 应为标示量的
      清场模板: standard_cleanup
      结论名称: 含量
      结论含数值: true
      结论判定:
        value_field: 平均含量
        unit: '%'
        rule: 平均含量 >= 93.0 && 平均含量 <= 107.0 && RD <= 2.0
      附加说明模板: data_page_attachment
      附加说明参数:
        items:
        - 图谱
        - 中间体检验报告单
      方法: HPLC
