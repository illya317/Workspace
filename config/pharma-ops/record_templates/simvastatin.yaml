      - 名称: “已清洁”
        状态: 已清洁
      - 名称: 高效液相色谱仪
        状态: 已清洁
      试验材料:
      - 名称: 流动相
      - 名称: 溶剂Ⅰ
      - 名称: 色谱柱
      标准品:
      - 名称: 辛伐他汀对照品
      - 名称: 洛伐他汀对照品
      标准规定模板: content_assay_range
      标准规定参数:
        subject: 含辛伐他汀（C25H38O5计）
        lower: 92.0
        upper: 108.0
        phrase: 应为标示量的
      清场模板: standard_cleanup
      结论名称: 含量均匀度
      结论含数值: true
      方法: HPLC
      结论判定:
        value_field: 平均含量
        unit: '%'
        rule: 平均含量 >= 92.0 && 平均含量 <= 108.0 && RD <= 2.0
