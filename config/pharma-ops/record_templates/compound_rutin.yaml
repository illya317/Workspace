        检验目的: 性状、水分、含量
        请验部门: 固体制剂车间
      文件清单:
      - 名称: 《复方芦丁片中间体质量标准》
        编码: MQS074006
      - 名称: 《复方芦丁片中间体检验标准操作规程》
        编码: SOP073406
      - 名称: 《MA37-1CN型水分快速测定仪使用与维护标准操作规程》
        编码: SOP072098
      - 名称: 《电子天平（BS224S、BSA224S）使用与维护标准操作规程》
        编码: SOP072028
      - 名称: 《BT125D十万分之一电子天平使用与维护标准操作规程》
        编码: SOP072055
      - 名称: 《TU-1901双光束紫外可见分光光度计使用与维护标准操作规程》
        编码: SOP072045
      - 名称: 《电热恒温水浴锅标准操作规程》
        编码: SOP072024
      确认项:
      - 名称: 仪器、设备是否在校验有效期内
      - 名称: 检验用具、物品是否齐全
      环境确认:
        符合要求: true
        不符合要求: true
    检测项:
    - 序号: '2.1'
      名称: 性状
      英文名: appearance
      实验环境模板: env_10_30_75
      标准规定模板: appearance_description
      标准规定参数:
        description: 本品应为黄色或黄绿色颗粒
      结论名称: 性状
      结论含数值: false
      方法: 目测
      结论判定:
        rule: 符合标准规定
    - 序号: '2.2'
      名称: 水分
      英文名: moisture
      实验环境模板: env_10_30_70
      仪器设备模板: standard_equipment_list
      仪器设备参数:
        items:
        - 快速水分测定仪
      标准规定模板: moisture_s_limit
      标准规定参数:
        limit: 5.0
      清场模板: standard_cleanup
      结论名称: 水分
      结论含数值: true
      结论判定:
        value_field: 平均水分
        unit: '%'
        rule: 平均水分 <= 5.0 && RD <= 2.0
      方法: 水分
    - 序号: '2.3'
      名称: 含量
      英文名: content
      实验环境模板: env_10_30_75
      实验环境参数:
        多行: 3
      仪器设备模板: standard_equipment_list
      仪器设备参数:
        items:
        - 电子天平
        - 紫外可见分光光度计
        - 数显恒温水浴锅
      试验材料模板: standard_material_list
      试验材料参数:
        items:
        - 60%乙醇
        - 0.02mol/L的醋酸液
        - 稀醋酸
        - 淀粉指示液
        - 0.05mol/L碘滴定液
      标准品模板: standard_reference_list
      标准品参数:
        items:
        - 芦丁对照品
      标准规定模板: multi_component_content_assay_range
      标准规定参数:
        components:
        - subject: 含芦丁（C27H30O16·3H2O）
          lower: 93.0
          upper: 107.0
        - subject: 含维生素C（C6H8O6）
          lower: 93.0
          upper: 107.0
      清场模板: standard_cleanup
      结论名称: 含量
      结论含数值: true
      结论判定:
        value_field: 芦丁平均含量 / 维C平均含量
        unit: '%'
        rule: 芦丁平均含量 >= 93.0 && 芦丁平均含量 <= 107.0 && 芦丁RD <= 2.0 && 维C平均含量 >= 93.0 && 维C平均含量 <= 107.0 && 维CRD <= 2.0
      附加说明模板: data_page_attachment
      附加说明参数:
        items:
        - 图谱
        - 中间体检验报告单
      方法: 复方芦丁含量
