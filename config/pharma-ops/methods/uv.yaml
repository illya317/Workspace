      formula: 平均含量
      note: 结论处自动填入平均含量
  UV-对照法:
    称重:
    - name: 对照含量
      unit: '%'
      type: number
      attr: fillable
    - name: 对照1-毛重
      unit: mg
      type: number
      attr: fillable
    - name: 对照1-皮重
      unit: mg
      type: number
      attr: fillable
    - name: 对照1-净重
      unit: mg
      type: number
      attr: calculated
      formula: 对照1-毛重 - 对照1-皮重
    - name: 对照2-毛重
      unit: mg
      type: number
      attr: fillable
    - name: 对照2-皮重
      unit: mg
      type: number
      attr: fillable
    - name: 对照2-净重
      unit: mg
      type: number
      attr: calculated
      formula: 对照2-毛重 - 对照2-皮重
    - name: 平均片重
      unit: g
      type: number
      attr: fillable
    - name: 样1-毛重
      unit: g
      type: number
      attr: fillable
    - name: 样1-皮重
      unit: g
      type: number
      attr: fillable
    - name: 样1-净重
      unit: g
      type: number
      attr: calculated
      formula: 样1-毛重 - 样1-皮重
    - name: 样2-毛重
      unit: g
      type: number
      attr: fillable
    - name: 样2-皮重
      unit: g
      type: number
      attr: fillable
    - name: 样2-净重
      unit: g
      type: number
      attr: calculated
      formula: 样2-毛重 - 样2-皮重
    测定:
    - name: 规格
      unit: mg
      type: number
      attr: prefilled
    - name: 波长
      unit: nm
      type: number
      attr: fillable
    - name: 空白OD
      type: number
      attr: fillable
    - name: 空白溶剂OD
      type: number
      attr: fillable
    - name: 对照1-OD
      type: number
      attr: fillable
    - name: 对照2-OD
      type: number
      attr: fillable
    - name: 平均-OD/mg
      type: number
      attr: calculated
      formula: (对照1-OD/对照1-净重 + 对照2-OD/对照2-净重) / 2
    - name: 样1-OD
      type: number
      attr: fillable
    - name: 样2-OD
      type: number
      attr: fillable
    - name: 样1-含量
      unit: '%'
      type: number
      attr: calculated
      formula: (样1-OD - 空白OD) / 平均-OD/mg * 对照含量 / 100 / (样1-净重 * 1000 / 平均片重 / 规格)
        * 100
      note: 通用公式，品种特殊系数需调整
    - name: 样2-含量
      unit: '%'
      type: number
      attr: calculated
      formula: (样2-OD - 空白OD) / 平均-OD/mg * 对照含量 / 100 / (样2-净重 * 1000 / 平均片重 / 规格)
        * 100
      note: 通用公式，品种特殊系数需调整
    - name: 平均含量
      unit: '%'
      type: number
      attr: calculated
      formula: (样1-含量 + 样2-含量) / 2
    - name: RD
      unit: '%'
      type: number
      attr: calculated
      formula: ABS(样1-含量 - 样2-含量) / 平均含量 * 100
