  - name: 平均耐酸力
    unit: '%'
    type: number
    attr: calculated
    formula: (样1-耐酸力 + 样2-耐酸力 + 样3-耐酸力 + 样4-耐酸力 + 样5-耐酸力 + 样6-耐酸力) / 6
  - name: 结论-结果
    unit: '%'
    type: number
    attr: calculated
    formula: 平均耐酸力
    note: 结论处自动填入平均耐酸力
  溶出度-HPLC:
  - name: 溶出介质
    type: text
