methods:
  溶出度:
  - name: 溶出介质
    type: text
    attr: prefilled
  - name: 介质体积
    unit: ml
    type: number
    attr: fillable
  - name: 转速
    unit: rpm
    type: number
    attr: fillable
  - name: 温度
    unit: ℃
    type: number
    attr: prefilled
    default: 37
  - name: 取样时间
    unit: min
    type: number
    attr: fillable
  - name: 检测波长
    unit: nm
    type: number
    attr: fillable
  - name: 空白OD
    type: number
    attr: fillable
  - name: 空白溶剂OD
    type: number
    attr: fillable
  - name: 对照OD
    type: number
    attr: fillable
  - name: 公式常数A
    type: number
    attr: prefilled
    default: 571
    note: 品种专属常数
  - name: 公式常数B
    type: number
    attr: prefilled
    default: 0.1
    note: 品种专属常数，如稀释倍数等
  - repeat:
      count: 6
      fields:
      - name: 样{序号}-OD
        type: number
        attr: fillable
      - name: 样{序号}-溶出度
        unit: '%'
        type: number
        attr: calculated
        formula: (样{序号}-OD - 空白OD) * 100 * 100 / (公式常数A * 公式常数B)
  - name: 平均溶出度
    unit: '%'
    type: number
    attr: calculated
    formula: (样1-溶出度 + 样2-溶出度 + 样3-溶出度 + 样4-溶出度 + 样5-溶出度 + 样6-溶出度) / 6
  - name: 结论-结果
    unit: '%'
    type: number
    attr: calculated
    formula: 平均溶出度
    note: 结论处自动填入平均溶出度
  酸中释放度-泮托拉唑UV:
  - name: 释放介质
    type: text
    attr: prefilled
    default: 0.1mol/L盐酸溶液
  - name: 介质体积
    unit: ml
    type: number
    attr: prefilled
    default: 900
  - name: 转速
    unit: rpm
    type: number
    attr: prefilled
    default: 100
  - name: 温度
    unit: ℃
    type: number
    attr: prefilled
    default: 37
  - name: 取样时间
    unit: min
    type: number
    attr: prefilled
    default: 120
  - name: 检测波长
    type: text
    attr: prefilled
    default: 288nm±2nm
  - name: 对照含量
    unit: '%'
    type: number
    attr: fillable
  - name: 对照毛重
    unit: mg
    type: number
    attr: fillable
  - name: 对照皮重
    unit: mg
    type: number
    attr: fillable
  - name: 对照净重
    unit: mg
    type: number
    attr: calculated
    formula: 对照毛重 - 对照皮重
  - name: 空白OD
    type: number
    attr: fillable
  - name: 空白溶剂OD
    type: number
    attr: fillable
  - name: 对照OD
    type: number
    attr: fillable
  - repeat:
      count: 6
      fields:
      - name: 样{序号}-OD
        type: number
        attr: fillable
      - name: 样{序号}-释放度
        unit: '%'
        type: number
        attr: calculated
        formula: (样{序号}-OD - 空白OD) * 对照净重 * 对照含量 * 0.9458 * 9 / ((对照OD - 空白OD) * 4 * 40)
  - name: 平均释放度
    unit: '%'
    type: number
    attr: calculated
    formula: (样1-释放度 + 样2-释放度 + 样3-释放度 + 样4-释放度 + 样5-释放度 + 样6-释放度) / 6
  - name: 结论-结果
    unit: '%'
    type: number
    attr: calculated
    formula: 平均释放度
    note: 结论处自动填入平均释放度
