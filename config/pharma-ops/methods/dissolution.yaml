  - name: 对照毛重
    unit: mg
    type: number
    attr: fillable
  - name: 对照皮重
    unit: mg
    type: number
    attr: fillable
  - name: 对照净重
    unit: mg
    type: number
    attr: calculated
    formula: 对照毛重 - 对照皮重
  - name: 对照1-峰面积
    type: number
    attr: fillable
  - name: 对照2-峰面积
    type: number
    attr: fillable
  - name: 对照平均峰面积
    type: number
    attr: calculated
    formula: (对照1-峰面积 + 对照2-峰面积) / 2
  - name: 对照RSD
    unit: '%'
    type: number
    attr: calculated
    formula: SQRT(((对照1-峰面积 - 对照平均峰面积)^2 + (对照2-峰面积 - 对照平均峰面积)^2) / 1) / 对照平均峰面积 * 100
  - repeat:
      count: 6
      fields:
      - name: 样{序号}-峰面积
        type: number
        attr: fillable
      - name: 样{序号}-溶出度
        unit: '%'
        type: number
        attr: calculated
        formula: 样{序号}-峰面积 * 对照净重 * 18 * 对照含量 / (对照平均峰面积 * 0.25 * 1000)
  - name: 平均溶出度
    unit: '%'
    type: number
    attr: calculated
    formula: (样1-溶出度 + 样2-溶出度 + 样3-溶出度 + 样4-溶出度 + 样5-溶出度 + 样6-溶出度) / 6
  - name: 结论-结果
    unit: '%'
    type: number
    attr: calculated
    formula: 平均溶出度
    note: 结论处自动填入平均溶出度
