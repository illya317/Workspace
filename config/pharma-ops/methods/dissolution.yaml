        attr: calculated
        formula: (样{序号}-OD - 空白胶囊OD) * 0.914 * 对照净重 * 对照含量 / (对照OD * 5 * 2)
  - name: 平均溶出度
    unit: '%'
    type: number
    attr: calculated
    formula: (样1-溶出度 + 样2-溶出度 + 样3-溶出度 + 样4-溶出度 + 样5-溶出度 + 样6-溶出度) / 6
  - name: 结论-结果
