methods:
  滴定:
  - name: 理论片重
    unit: g/片
    type: number
    attr: fillable
  - name: 样1-称重
    unit: g
    type: number
    attr: fillable
  - name: 样2-称重
    unit: g
    type: number
    attr: fillable
  - name: 滴定液浓度
    unit: mol/L
    type: number
    attr: fillable
  - name: 样1-消耗体积
    unit: ml
    type: number
    attr: fillable
  - name: 样1-含量
    unit: '%'
    type: number
    attr: fillable
    note: 品种专属公式，暂无自动计算
  - name: 样2-消耗体积
    unit: ml
    type: number
    attr: fillable
  - name: 样2-含量
    unit: '%'
    type: number
    attr: fillable
    note: 品种专属公式，暂无自动计算
  - name: 平均含量
    unit: '%'
    type: number
    attr: calculated
    formula: (样1-含量 + 样2-含量) / 2
  - name: RD
    unit: '%'
    type: number
    attr: calculated
    formula: ABS(样1-含量 - 样2-含量) / 平均含量 * 100
