      标准规定: 内控标准：单个杂质和总杂质应符合规定。
      related_weighing_rows:
      - name: 对照溶液（mg）
        content: ''
        unit: mg
        mode: blank
      - name: 供试品（g）
        content: /
        unit: g
        mode: blank
      related_peak_rows:
      - group: 对照溶液
