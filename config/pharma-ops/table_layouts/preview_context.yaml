产品名称: 模板预览
阶段:
  default:
    显示名: ''
    检验前确认:
      顶部信息:
        检品名称: 虚拟检品
        包装情况: 预览包装
        检验目的: 性状、鉴别、水分、含量、有关物质、溶出度、含量均匀度、重量/装量差异、脆碎度、崩解时限、微生物限度
        请验部门: 预览部门
      文件清单:
      - 名称: 《虚拟检品质量标准》
        编码: MQS000000
      - 名称: 《虚拟检品检验标准操作规程》
        编码: SOP000000
      - 名称: 《通用仪器使用与维护标准操作规程》
        编码: SOP000001
      确认项:
      - 名称: 仪器、设备是否在校验有效期内
      - 名称: 检验用具、物品是否齐全
      环境确认:
        符合要求: true
        不符合要求: true
    检测项:
    - 序号: '2.1'
      名称: 性状
      英文名: appearance
      方法: 目测
      实验环境:
        温度: 10℃～30℃
        湿度: ≤75%
      操作方法: 取虚拟检品适量，目测，本品为____。
      标准规定: 内控标准：本品应符合预览性状要求。
      清场:
      - 将检验用具及废弃物分类。
      - 清洁设备及房间。
      结论名称: 性状
      结论含数值: false
      结论判定:
        rule: 符合标准规定
    - 序号: '2.2'
      名称: 鉴别
      英文名: identification
      方法: 鉴别
      实验环境:
        温度: 10℃～30℃
        湿度: ≤75%
      操作方法: 取虚拟检品适量，按规定方法进行鉴别。
      标准规定: 内控标准：鉴别结果应呈正反应。
      清场:
      - 将检验用具及废弃物分类。
      - 清洁设备及房间。
      结论名称: 鉴别
      结论含数值: false
      结论判定:
        rule: 符合标准规定
    - 序号: '2.3'
      名称: 水分
      英文名: moisture
      方法: 水分
      实验环境:
        温度: 10℃～30℃
        湿度: ≤70%
      仪器设备模板: standard_equipment_list
      仪器设备参数:
        items:
        - 快速水分测定仪
      操作方法: 称取虚拟检品约1.0g，均匀铺置水分测定仪托盘上，测定。
      标准规定: 内控标准：水分应≤5.0%，RD≤2.0%。
      清场:
      - 将检验用具及废弃物分类。
      - 关闭电源。
      - 清洁设备及房间。
      结论名称: 水分
      结论含数值: true
      结论判定:
        value_field: 平均水分
        unit: '%'
        rule: 平均水分 <= 5.0 && RD <= 2.0
    - 序号: '2.4'
      名称: 含量
      英文名: content
      方法: HPLC
      实验环境:
        温度: 10℃～30℃
        湿度: ≤75%（天平室≤70%）
        多行: 3
      仪器设备模板: standard_equipment_list
      仪器设备参数:
        items:
        - 电子天平
        - 高效液相色谱仪
      试验材料模板: standard_material_list
      试验材料参数:
        items:
        - 流动相
        - 色谱柱
      标准品模板: standard_reference_list
      标准品参数:
        items:
        - 虚拟对照品
      操作方法: 取虚拟检品适量，按高效液相色谱法测定。
      标准规定: 内控标准：含量应为标示量的95.0%～105.0%，RD≤2.0%。
      清场:
      - 将检验用具及废弃物分类。
      - 关闭电源。
      - 清洁设备及房间。
      结论名称: 含量
      结论含数值: true
      附加说明模板: data_page_attachment
      附加说明参数:
        items:
        - 原始数据
        - 图谱
      结论判定:
        value_field: 平均含量
        unit: '%'
        rule: 平均含量 >= 95.0 && 平均含量 <= 105.0 && RD <= 2.0
