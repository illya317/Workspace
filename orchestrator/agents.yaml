architecture:
  role: "architecture governance, platform boundaries, and repository guardrails"
  route_scope:
    - core/
    - packages/core/
    - packages/platform/
    - scripts/arch/
    - scripts/check/
    - orchestrator/
    - docs/
    - root configuration

feature:
  role: "business feature development"
  route_scope:
    - app/
    - packages/
    - server/services/
    - lib/

data:
  role: "ETL, import, schema transformation"
  route_scope:
    - prisma/
    - scripts/data/
    - scripts/import/
    - packages/*/import/

ops:
  role: "CI/CD, deploy, runtime, performance"
  route_scope:
    - .github/
    - ops/
    - orchestrator/
    - deploy.sh
