architect:
  role: "architecture, rules, CI, core, platform"
  can_write:
    - core/
    - packages/core/
    - packages/platform/
    - scripts/
    - .github/
    - orchestrator/
    - docs/
    - AGENTS.md
    - README.md
    - package.json
    - package-lock.json
    - tsconfig.json
    - .gitignore
    - next.config.ts
    - eslint.config.mjs
    - playwright.config.ts
  cannot_write:
    - "packages/* except packages/core and packages/platform"
    - app/
    - prisma/

feature:
  role: "business feature development"
  can_write:
    - app/
    - app/api/
    - packages/
    - server/services/
    - lib/
  cannot_write:
    - core/
    - packages/core/
    - packages/platform/
    - orchestrator/
    - .github/
    - scripts/check/
    - scripts/arch/
    - prisma/

data:
  role: "ETL, import, schema transformation"
  can_write:
    - prisma/
    - scripts/data/
    - scripts/import/
    - packages/*/import/
  cannot_write:
    - app/
    - core/
    - packages/core/
    - packages/platform/
    - orchestrator/
    - .github/

ops:
  role: "CI/CD, deploy, runtime, performance"
  can_write:
    - .github/
    - ops/
    - scripts/
    - orchestrator/
    - deploy.sh
  cannot_write:
    - app/
    - packages/
    - prisma/
    - core/
