version: 1

label:
  required_prefix: "agent:"
  allowed:
    - architecture
    - feature
    - data
    - ops
  aliases:
    architect: architecture

classification:
  mixed_pr_policy: route_to_architecture
  unknown_path_policy: route_to_architecture
  precedence:
    - architecture
    - data
    - ops
    - feature

routing:
  architecture:
    - core/**
    - packages/core/**
    - packages/platform/**
    - orchestrator/**
    - .github/workflows/orchestrator.yml
    - scripts/orchestrator-check.ts
    - scripts/arch/**
    - scripts/check/**
    - docs/**
    - AGENTS.md
    - README.md
    - rules.md
    - package.json
    - package-lock.json
    - tsconfig.json
    - .gitignore
    - next.config.ts
    - eslint.config.mjs
    - playwright.config.ts
  data:
    - prisma/**
    - scripts/data/**
    - scripts/import/**
    - packages/*/import/**
  ops:
    - .github/**
    - ops/**
    - deploy.sh
  feature:
    - app/**
    - lib/**
    - server/services/**
    - packages/*/**

risk:
  high:
    - orchestrator/**
    - .github/**
    - scripts/arch/**
    - scripts/check/**
    - core/**
    - packages/core/**
    - packages/platform/**
    - package.json
    - package-lock.json
    - tsconfig.json
  medium:
    - prisma/**
    - scripts/data/**
    - scripts/import/**
    - packages/*/import/**
    - server/services/**

flow:
  - "PR"
  - "Orchestrator: emits target/risk/review_required only"
  - "Reviewer: evaluates correctness, architecture violations, permissions, security, and duplication"
  - "CI Gate"
  - "Merge"

output:
  target: "feature | architecture | data | ops"
  risk: "low | medium | high"
  review_required: "boolean"
